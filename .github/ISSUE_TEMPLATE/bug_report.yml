name: Bug report
description: Something isn't working as expected
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: What did you expect to happen, and what happened instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Upload ...
        3. See error
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Environment
      placeholder: "Browser, OS, and where it ran (local / Vercel)"
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Redact any API keys or other secrets before pasting.
